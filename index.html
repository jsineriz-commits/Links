<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Story Generator — deCampoaCampo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #2ecc71;
      --green2: #27ae60;
      --dark:   #0d1117;
      --card:   #161b22;
      --card2:  #1e2530;
      --border: #30363d;
      --text:   #e6edf3;
      --sub:    #8b949e;
      --accent: #f0c040;
    }

    html, body { min-height: 100vh; background: var(--dark); color: var(--text); font-family: 'Outfit', sans-serif; }

    .app { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── header ── */
    .header { text-align: center; margin-bottom: 2.5rem; }
    .header .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #fff; font-size: .75rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase; padding: .35rem .9rem; border-radius: 999px; margin-bottom: 1rem;
    }
    .header h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900; line-height: 1.15;
      background: linear-gradient(135deg, #fff 30%, var(--green));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { color: var(--sub); margin-top: .6rem; font-size: 1rem; }

    /* ── input card ── */
    .input-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
    .input-row { display: flex; gap: .75rem; flex-wrap: wrap; }
    .input-row input {
      flex: 1; min-width: 240px; background: var(--dark); border: 1.5px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: .95rem; padding: .85rem 1.1rem; transition: border-color .2s; outline: none;
    }
    .input-row input:focus { border-color: var(--green); }
    .input-row input::placeholder { color: var(--sub); }

    .btn-gen {
      background: linear-gradient(135deg, var(--green), var(--green2));
      color: #fff; border: none; border-radius: 10px; font-family: 'Outfit', sans-serif;
      font-size: .95rem; font-weight: 700; padding: .85rem 1.8rem; cursor: pointer;
      white-space: nowrap; transition: opacity .2s, transform .15s; display: flex; align-items: center; gap: .5rem;
    }
    .btn-gen:hover:not(:disabled) { opacity: .9; transform: translateY(-1px); }
    .btn-gen:disabled { opacity: .5; cursor: not-allowed; }

    /* ── status ── */
    .status-msg { margin-top: 1rem; font-size: .9rem; color: var(--sub); display: none; align-items: center; gap: .5rem; }
    .status-msg.visible { display: flex; }
    .status-msg.error { color: #f85149; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── two-column output ── */
    .output-area { display: none; gap: 2rem; align-items: flex-start; }
    .output-area.visible { display: grid; grid-template-columns: 1fr 1fr; }
    @media (max-width: 700px) { .output-area.visible { grid-template-columns: 1fr; } }

    /* ── preview ── */
    .preview-panel { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
    .story-wrap { width: 100%; max-width: 340px; aspect-ratio: 9/16; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px #00000088; position: relative; }
    #storyCanvas { width: 100%; height: 100%; display: block; }

    .btn-dl {
      background: linear-gradient(135deg, var(--accent), #e6a800); color: #111; border: none;
      border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 800;
      padding: .9rem 2rem; cursor: pointer; width: 100%; max-width: 340px;
      transition: opacity .2s, transform .15s; display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-dl:hover { opacity: .9; transform: translateY(-1px); }

    .btn-dl-secondary {
      background: transparent; color: var(--sub); border: 1.5px solid var(--border);
      border-radius: 10px; font-family: 'Outfit', sans-serif; font-size: .85rem; font-weight: 600;
      padding: .6rem 1.5rem; cursor: pointer; width: 100%; max-width: 340px;
      transition: opacity .2s, border-color .2s; display: flex; align-items: center; justify-content: center; gap: .4rem;
    }
    .btn-dl-secondary:hover { border-color: var(--sub); opacity: .8; }

    /* ── info panel ── */
    .info-panel { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
    .info-panel h3 { font-size: 1rem; font-weight: 700; color: var(--green); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .08em; }
    .info-row { display: flex; justify-content: space-between; align-items: flex-start; padding: .6rem 0; border-bottom: 1px solid var(--border); gap: 1rem; }
    .info-row:last-child { border-bottom: none; }
    .info-label { color: var(--sub); font-size: .85rem; flex-shrink: 0; }
    .info-value { font-size: .9rem; font-weight: 600; text-align: right; word-break: break-word; }

    /* ── customize ── */
    .customize-card { background: var(--card2); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 2rem; display: none; }
    .customize-card.visible { display: block; }
    .customize-card h3 { font-size: .9rem; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 1rem; }
    .cust-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .cust-field label { display: block; font-size: .8rem; color: var(--sub); margin-bottom: .35rem; }
    .cust-field input[type=text],
    .cust-field input[type=number],
    .cust-field textarea {
      width: 100%; background: var(--dark); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: 'Inter', sans-serif;
      font-size: .88rem; padding: .6rem .85rem; outline: none; transition: border-color .2s; resize: vertical;
    }
    .cust-field textarea { min-height: 70px; }
    .cust-field input:focus, .cust-field textarea:focus { border-color: var(--green); }

    .theme-selector { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .3rem; }
    .theme-btn { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: border-color .2s, transform .15s; }
    .theme-btn:hover, .theme-btn.active { border-color: #fff; transform: scale(1.1); }

    .btn-regen {
      margin-top: 1rem; background: var(--card); color: var(--text); border: 1.5px solid var(--border);
      border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: .9rem; font-weight: 600;
      padding: .65rem 1.5rem; cursor: pointer; transition: border-color .2s, background .2s;
    }
    .btn-regen:hover { border-color: var(--green); background: #1a3a2a; color: var(--green); }
  </style>
</head>
<body>
<div class="app">

  <header class="header">
    <div class="badge">🐄 Story Generator</div>
    <h1>Generador de Stories<br>para WhatsApp e Instagram</h1>
    <p>Pegá el link de deCampoaCampo y descargá tu publicación lista para compartir</p>
  </header>

  <div class="input-card">
    <div class="input-row">
      <input id="urlInput" type="url"
        placeholder="https://www.decampoacampo.com/__dcac/25-Vacas-CUT-Prenadas-..."
        autocomplete="off" />
      <button class="btn-gen" id="btnGen" onclick="fetchLote()">
        <span>🚀</span> Generar Story
      </button>
    </div>
    <div class="status-msg" id="statusMsg">
      <div class="spinner" id="spinner"></div>
      <span id="statusText">Cargando datos del lote…</span>
    </div>
  </div>

  <!-- Customize -->
  <div class="customize-card" id="customizeCard">
    <h3>✏️ Personalizar</h3>
    <div class="cust-field" style="margin-bottom:.8rem">
      <label>Tema de color</label>
      <div class="theme-selector" id="themeSelector"></div>
    </div>
    <div class="cust-field">
      <label>Mensaje extra (opcional)</label>
      <textarea id="custMsg" placeholder="Ej: Disponible ahora · Consultá sin compromiso" oninput="redraw()"></textarea>
    </div>
    <button class="btn-regen" onclick="redraw()">🔄 Regenerar preview</button>
  </div>

  <!-- Output -->
  <div class="output-area" id="outputArea">
    <div class="preview-panel">
      <div class="story-wrap">
        <canvas id="storyCanvas"></canvas>
      </div>
      <button class="btn-dl" id="btnDl" onclick="shareOrDownload()">
        📤 Compartir imagen
      </button>
      <button class="btn-dl-secondary" id="btnDlSecondary" onclick="downloadOnly()" style="display:none">
        ⬇️ Solo descargar
      </button>
    </div>
    <div class="info-panel" id="infoPanel">
      <h3>📋 Datos del Lote</h3>
      <div id="infoRows"></div>
    </div>
  </div>

</div>

<script>
/* ── THEMES ── */
const THEMES = [
  { id:'cielo',  label:'Azul',    bg:['#0a1628','#1a3a5c'],  accent:'#60b0ff', text:'#e8f4ff', bar:'#2980b9' },
  { id:'campo',  label:'Verde',   bg:['#0d2b0f','#1a4d1a'],  accent:'#4ade80', text:'#e0ffe8', bar:'#27ae60' },
  { id:'tierra', label:'Amarillo',bg:['#2b1a0a','#4d3010'],  accent:'#f0c030', text:'#fff5e0', bar:'#c87820' },
  { id:'fuego',  label:'Rojo',    bg:['#2b0a0a','#4d1010'],  accent:'#f87171', text:'#ffe8e8', bar:'#dc2626' },
];
const themeColors = ['#2980b9','#27ae60','#c87820','#dc2626'];
const DEFAULT_THEME_IDX = 0; // Azul
let activeTheme = THEMES[DEFAULT_THEME_IDX];
let loteData = null;
let cachedImg = null;

THEMES.forEach((t, i) => {
  const btn = document.createElement('button');
  btn.className = 'theme-btn' + (i === DEFAULT_THEME_IDX ? ' active' : '');
  btn.style.background = themeColors[i];
  btn.title = t.label;
  btn.onclick = () => {
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTheme = t;
    redraw();
  };
  document.getElementById('themeSelector').appendChild(btn);
});

/* ── FETCH via /api/proxy ── */
async function fetchLote() {
  const raw = document.getElementById('urlInput').value.trim();
  if (!raw) { showError('Ingresá un link de deCampoaCampo'); return; }
  if (!raw.includes('decampoacampo.com')) { showError('El link debe ser de decampoacampo.com'); return; }

  setLoading(true);
  loteData = null;
  cachedImg = null;

  try {
    const proxyUrl = `/api/proxy?url=${encodeURIComponent(raw)}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` }));
      throw new Error(err.error || `Error ${res.status}`);
    }
    const html = await res.text();
    if (!html || html.length < 100) throw new Error('Respuesta vacía — el sitio no respondió bien');

    // Use the final (redirected) URL if available
    const finalUrl = res.headers.get('x-final-url') || raw;

    loteData = parseHTML(html, finalUrl);

    // Show soft warning if very little data found (don't block — show whatever we have)
    if (!loteData.title && !loteData.image && !loteData.sku) {
      showError('⚠️ Datos limitados — el link corto no devolvió información completa. Probá con el link largo de la página del lote.');
    }

    renderInfo(loteData);

    // Wait for fonts before drawing canvas (critical on mobile)
    await document.fonts.ready;
    await renderCanvas(loteData);

    document.getElementById('outputArea').classList.add('visible');
    document.getElementById('customizeCard').classList.add('visible');
    setLoading(false);
    updateShareButton();

    // Safety redraw after 1.5s in case fonts/image were still loading on mobile
    setTimeout(() => { if (loteData) redraw(); }, 1500);
  } catch (e) {
    setLoading(false);
    showError(e.message);
  }
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') fetchLote(); });

/* ── PARSE HTML — regex-first (mobile safe) ── */
function parseHTML(html, url) {
  // Regex extractor: works even when DOMParser strips/misparses tags on iOS
  function rxMeta(prop) {
    // property="..." content="..."
    const r1 = new RegExp(`<meta[^>]+(?:property|name)=["']${prop}["'][^>]+content=["']([^"']+)["']`, 'i');
    // content="..." property="..."  (reversed attribute order)
    const r2 = new RegExp(`<meta[^>]+content=["']([^"']+)["'][^>]+(?:property|name)=["']${prop}["']`, 'i');
    const m = html.match(r1) || html.match(r2);
    return m ? decodeHtmlEntities(m[1].trim()) : '';
  }

  function decodeHtmlEntities(s) {
    return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'");
  }

  // Also try DOMParser as secondary confirm
  let doc = null;
  try { doc = new DOMParser().parseFromString(html, 'text/html'); } catch(e) {}
  function domMeta(prop) {
    if (!doc) return '';
    const el = doc.querySelector(`meta[property="${prop}"], meta[name="${prop}"]`);
    return el ? (el.getAttribute('content') || '') : '';
  }

  const title       = rxMeta('og:title')       || domMeta('og:title')       || (() => { const m = html.match(/<title[^>]*>([^<]+)<\/title>/i); return m ? decodeHtmlEntities(m[1].trim()) : ''; })();
  const description = rxMeta('og:description') || domMeta('og:description') || rxMeta('description') || '';
  const image       = rxMeta('og:image')       || domMeta('og:image')       || rxMeta('twitter:image') || '';

  // JSON-LD via regex (most reliable on mobile)
  let price = '', sku = '', raza = '';
  const ldMatch = html.match(/<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/i);
  if (ldMatch) {
    try {
      const ld = JSON.parse(ldMatch[1]);
      price = ld.offers?.price ? formatPrice(ld.offers.price) : '';
      sku   = ld.sku || ld.mpn || '';
      raza  = ld.brand?.name || '';
    } catch (e) {}
  }

  // Fallback: extract sku from URL slug (e.g. -31667 at end)
  if (!sku) {
    const skuM = url.match(/-(\d+)(?:\/)?$/);
    if (skuM) sku = skuM[1];
  }

  const cabezasMatch = title.match(/^(\d+)/);
  const cabezas = cabezasMatch ? cabezasMatch[1] : '';
  const pesoMatch = title.match(/(\d+)\s*kg/i);
  const peso = pesoMatch ? pesoMatch[1] + ' kg' : '';
  const categoria = extractCategoria(title);
  const zona = extractZona(description);

  return { title, description, image, price, sku, raza, cabezas, peso, categoria, zona, url };
}



function extractCategoria(title) {
  const cats = ['Vacas CUT','Novillos','Novillitos','Vaquillonas','Terneros','Terneras','Toros','Vacas de Cría','Vacas Preñadas','Vacas'];
  for (const c of cats) { if (title.toLowerCase().includes(c.toLowerCase())) return c; }
  return title.split(' ').slice(1, 4).join(' ');
}

function extractZona(desc) {
  const m = desc.match(/zona de ([^\.]+)/i) || desc.match(/de la zona de ([^\.]+)/i);
  return m ? m[1].trim() : '';
}

function formatPrice(p) {
  const n = parseInt(p);
  return isNaN(n) ? '' : '$' + n.toLocaleString('es-AR');
}

/* ── RENDER INFO ── */
function renderInfo(d) {
  const rows = [
    ['Categoría',    d.categoria],
    ['Cabezas',      d.cabezas ? d.cabezas + ' animales' : ''],
    ['Peso promedio', d.peso],
    ['Raza',         d.raza],
    ['Zona',         d.zona],
    ['Precio/cabeza', d.price],
    ['ID lote',      d.sku ? '#' + d.sku : ''],
  ].filter(([, v]) => v);

  document.getElementById('infoRows').innerHTML = rows.map(([l, v]) =>
    `<div class="info-row"><span class="info-label">${l}</span><span class="info-value">${v}</span></div>`
  ).join('');
}

/* ── CANVAS ── */
const CANVAS_W = 1080;
const CANVAS_H = 1920;

async function renderCanvas(d) {
  const canvas = document.getElementById('storyCanvas');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  const ctx = canvas.getContext('2d');

  // Load image through our own /api/image proxy
  cachedImg = null;
  if (d.image) {
    // Try proxy first, then direct URL as fallback
    const attempts = [
      `/api/image?url=${encodeURIComponent(d.image)}`,
      d.image,
    ];
    for (const src of attempts) {
      try {
        cachedImg = await loadImage(src);
        break; // got it
      } catch (e) {
        // try next
      }
    }
  }
  drawStory(ctx, d, cachedImg, activeTheme);
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = () => res(img);
    img.onerror = rej;
    img.src = src;
  });
}

function redraw() {
  if (!loteData) return;
  const ctx = document.getElementById('storyCanvas').getContext('2d');
  drawStory(ctx, loteData, cachedImg, activeTheme);
}

function drawStory(ctx, d, img, theme) {
  const W = CANVAS_W, H = CANVAS_H;
  const phone = '';
  const name  = '';
  const msg   = document.getElementById('custMsg')?.value.trim()   || '';

  /* background */
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, theme.bg[0]);
  grad.addColorStop(1, theme.bg[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  /* texture circles */
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = theme.accent;
  ctx.beginPath(); ctx.arc(W * .85, H * .10, 350, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(W * .10, H * .75, 280, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  /* top bar */
  ctx.fillStyle = theme.bar + 'cc';
  roundRect(ctx, 0, 0, W, 90, 0); ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 38px Outfit, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('deCampoaCampo', 50, 58);

  if (d.sku) {
    const pill = `Lote #${d.sku}`;
    ctx.font = 'bold 28px Outfit, sans-serif';
    const tw = ctx.measureText(pill).width + 40;
    ctx.fillStyle = theme.accent + 'dd';
    roundRect(ctx, W - tw - 40, 18, tw, 54, 12); ctx.fill();
    ctx.fillStyle = '#111'; ctx.textAlign = 'right';
    ctx.fillText(pill, W - 60, 53);
  }

  /* photo */
  const photoTop = 120;
  const photoH   = Math.round(H * 0.36);

  ctx.save();
  roundRect(ctx, 30, photoTop, W - 60, photoH, 24);
  ctx.clip();

  if (img) {
    const scale = Math.max((W - 60) / img.width, photoH / img.height);
    const sw = img.width * scale, sh = img.height * scale;
    ctx.drawImage(img, 30 + ((W - 60) - sw) / 2, photoTop + (photoH - sh) / 2, sw, sh);
  } else {
    ctx.fillStyle = '#1a2a1a';
    ctx.fillRect(30, photoTop, W - 60, photoH);
    ctx.font = '120px serif'; ctx.textAlign = 'center'; ctx.fillStyle = theme.accent + '44';
    ctx.fillText('🐄', W / 2, photoTop + photoH / 2 + 40);
  }

  /* photo gradient overlay */
  const pGrad = ctx.createLinearGradient(0, photoTop + photoH * .5, 0, photoTop + photoH);
  pGrad.addColorStop(0, 'transparent');
  pGrad.addColorStop(1, theme.bg[1]);
  ctx.fillStyle = pGrad;
  ctx.fillRect(30, photoTop, W - 60, photoH);
  ctx.restore();

  /* categoria badge on photo */
  const badgeY = photoTop + photoH - 56;
  ctx.save();
  ctx.font = 'bold 32px Outfit, sans-serif';
  const catW = ctx.measureText(d.categoria.toUpperCase()).width + 44;
  ctx.fillStyle = theme.accent;
  roundRect(ctx, 50, badgeY, catW, 52, 10); ctx.fill();
  ctx.fillStyle = '#111'; ctx.textAlign = 'left';
  ctx.fillText(d.categoria.toUpperCase(), 72, badgeY + 36);
  ctx.restore();

  /* stats row */
  let y = photoTop + photoH + 30;
  const statW = (W - 60) / 2 - 15;

  function statCard(x, value, label) {
    ctx.fillStyle = theme.accent + '22';
    roundRect(ctx, x, y, statW, 150, 16); ctx.fill();
    ctx.strokeStyle = theme.accent + '55'; ctx.lineWidth = 2;
    roundRect(ctx, x, y, statW, 150, 16); ctx.stroke();
    ctx.fillStyle = theme.accent;
    ctx.font = 'bold 72px Outfit, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(value, x + statW / 2, y + 88);
    ctx.fillStyle = theme.text + 'bb';
    ctx.font = '28px Outfit, sans-serif';
    ctx.fillText(label, x + statW / 2, y + 128);
  }

  if (d.cabezas) statCard(30, d.cabezas, 'CABEZAS');
  if (d.peso)    statCard(30 + statW + 30, d.peso, 'PESO PROM.');

  y += 220; // extra gap so raza text baseline clears the stat card bottom

  /* raza — wrapText returns final Y so we advance correctly even on 2+ lines */
  if (d.raza) {
    ctx.textAlign = 'left'; ctx.fillStyle = theme.text;
    ctx.font = 'bold 34px Outfit, sans-serif';
    const razaEndY = wrapText(ctx, d.raza, 50, y, W - 100, 46);
    y = razaEndY + 50;
  }

  /* zona — also wraps if needed */
  if (d.zona) {
    ctx.fillStyle = theme.text + 'aa'; ctx.font = '28px Outfit, sans-serif'; ctx.textAlign = 'left';
    const zonaEndY = wrapText(ctx, '📍 ' + d.zona, 50, y, W - 100, 38);
    y = zonaEndY + 48;
  }

  /* price */
  if (d.price) {
    ctx.fillStyle = theme.bar + 'aa';
    roundRect(ctx, 30, y, W - 60, 110, 16); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 44px Outfit, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('💰 ' + d.price + ' / cabeza', W / 2, y + 70);
    y += 130;
  }

  /* custom msg */
  if (msg) {
    ctx.fillStyle = theme.text + 'cc'; ctx.font = 'italic 30px Outfit, sans-serif'; ctx.textAlign = 'center';
    wrapText(ctx, msg, W / 2, y, W - 100, 38);
    y += 60;
  }

  /* bottom bar — only shown when user provided contact info */
  const bottomLine = [name, phone].filter(Boolean).join('   ·   ');
  if (bottomLine) {
    const bottomH = 130;
    const bottomY = H - bottomH;
    ctx.fillStyle = theme.bar + 'ee';
    roundRect(ctx, 0, bottomY, W, bottomH, 0); ctx.fill();
    ctx.fillStyle = theme.accent; ctx.font = 'bold 40px Outfit, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(bottomLine, W / 2, bottomY + 78);
  }
}

/* ── UTILS ── */
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Returns the Y of the LAST line drawn (so callers can advance correctly)
function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '', curY = y;
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line.trim(), x, curY);
      line = word + ' ';
      curY += lineH;
    } else { line = test; }
  }
  if (line.trim()) ctx.fillText(line.trim(), x, curY);
  return curY; // ← final Y for proper spacing
}

function setLoading(on) {
  document.getElementById('btnGen').disabled = on;
  const msg = document.getElementById('statusMsg');
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  document.getElementById('statusText').textContent = 'Cargando datos del lote…';
  msg.classList.toggle('visible', on);
  if (on) msg.classList.remove('error');
}

function showError(errMsg) {
  const msg = document.getElementById('statusMsg');
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('statusText').textContent = '⚠️ ' + errMsg;
  msg.classList.add('visible', 'error');
}

/* ── SHARE / DOWNLOAD ── */
function updateShareButton() {
  // Check if native share with files is supported (mobile browsers)
  const canvas = document.getElementById('storyCanvas');
  canvas.toBlob((blob) => {
    const file = new File([blob], 'story.png', { type: 'image/png' });
    const canShareFiles = navigator.share && navigator.canShare && navigator.canShare({ files: [file] });
    const btn = document.getElementById('btnDl');
    const btnSec = document.getElementById('btnDlSecondary');
    if (canShareFiles) {
      btn.innerHTML = '📤 Compartir en WhatsApp / Instagram';
      btnSec.style.display = 'flex'; // show secondary download button
    } else {
      btn.innerHTML = '⬇️ Descargar imagen';
      btnSec.style.display = 'none';
    }
  }, 'image/png');
}

async function shareOrDownload() {
  const canvas = document.getElementById('storyCanvas');
  const slug = loteData?.sku || 'lote';
  const filename = `dcac-story-${slug}.png`;

  canvas.toBlob(async (blob) => {
    const file = new File([blob], filename, { type: 'image/png' });

    // Try native share (opens WhatsApp, Instagram, etc.)
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: loteData?.title || 'Lote deCampoaCampo',
          text: `🐄 Ver lote: ${loteData?.url || 'decampoacampo.com'}`,
        });
        return; // shared successfully
      } catch (e) {
        if (e.name === 'AbortError') return; // user cancelled, do nothing
        // fallthrough to download
      }
    }

    // Fallback: download
    downloadBlob(blob, filename);
  }, 'image/png');
}

function downloadOnly() {
  const canvas = document.getElementById('storyCanvas');
  canvas.toBlob((blob) => {
    downloadBlob(blob, `dcac-story-${loteData?.sku || 'lote'}.png`);
  }, 'image/png');
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = filename;
  link.href = url;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}
